<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1280" height="720" fill="#0A0A0B"/>
  <rect x="0.5" y="0.5" width="1279" height="719" fill="none" stroke="#D9FF4B" stroke-opacity="0.12"/>

  <text x="64" y="68" fill="#86868B" font-size="14" letter-spacing="4">DATA FLOW / SDK · API · WEBHOOKS</text>
  <text x="64" y="110" fill="#F2F1ED" font-size="34" font-weight="600">Braze Integration Surface</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D9FF4B" fill-opacity="0.7"/>
    </marker>
  </defs>

  <!-- Left: client apps -->
  <text x="64" y="170" fill="#86868B" font-size="13" letter-spacing="2">CLIENT APPLICATIONS</text>
  <rect x="64" y="186" width="300" height="120" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <text x="84" y="222" fill="#F2F1ED" font-size="17" font-weight="600">Mobile &amp; Web Apps</text>
  <text x="84" y="248" fill="#86868B" font-size="12">iOS · Android · Web</text>
  <text x="84" y="270" fill="#86868B" font-size="12">Banking &amp; lending flows</text>

  <rect x="64" y="330" width="300" height="120" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <text x="84" y="366" fill="#F2F1ED" font-size="17" font-weight="600">Backend Services</text>
  <text x="84" y="392" fill="#86868B" font-size="12">Server-to-server events</text>
  <text x="84" y="414" fill="#86868B" font-size="12">Identity &amp; attributes</text>

  <!-- arrows into Braze -->
  <line x1="364" y1="246" x2="500" y2="300" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <text x="372" y="262" fill="#86868B" font-size="11">SDK ingest</text>
  <line x1="364" y1="390" x2="500" y2="340" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <text x="372" y="416" fill="#86868B" font-size="11">REST API</text>

  <!-- Center: Braze -->
  <rect x="508" y="240" width="264" height="160" fill="#0A0A0B" stroke="#D9FF4B" stroke-opacity="0.35"/>
  <text x="528" y="278" fill="#D9FF4B" font-size="18" font-weight="600">Braze</text>
  <g font-size="13">
    <rect x="528" y="296" width="224" height="40" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
    <text x="548" y="321" fill="#F2F1ED">SDK · user sessions</text>
    <rect x="528" y="344" width="224" height="40" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
    <text x="548" y="369" fill="#F2F1ED">REST · /users/track</text>
  </g>

  <!-- right: messaging + webhooks -->
  <line x1="772" y1="320" x2="908" y2="246" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <text x="784" y="276" fill="#86868B" font-size="11">campaigns</text>
  <line x1="772" y1="320" x2="908" y2="390" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <text x="784" y="372" fill="#86868B" font-size="11">webhook</text>

  <text x="916" y="170" fill="#86868B" font-size="13" letter-spacing="2">ACTIVATION</text>
  <rect x="916" y="186" width="300" height="120" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <text x="936" y="222" fill="#F2F1ED" font-size="17" font-weight="600">Canvas &amp; Campaigns</text>
  <text x="936" y="248" fill="#86868B" font-size="12">Push · in-app · email</text>
  <text x="936" y="270" fill="#86868B" font-size="12">Lifecycle journeys</text>

  <rect x="916" y="330" width="300" height="120" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <text x="936" y="366" fill="#F2F1ED" font-size="17" font-weight="600">Webhook Targets</text>
  <text x="936" y="392" fill="#86868B" font-size="12">External SMS triggering</text>
  <text x="936" y="414" fill="#86868B" font-size="12">Partner &amp; internal APIs</text>

  <text x="64" y="510" fill="#86868B" font-size="13" letter-spacing="2">DELIVERY GUARANTEES</text>
  <rect x="64" y="526" width="1152" height="120" fill="#0A0A0B" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <g font-size="13">
    <rect x="84" y="548" width="358" height="80" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
    <text x="104" y="582" fill="#D9FF4B">SDK ↔ API parity</text>
    <text x="104" y="606" fill="#86868B" font-size="12">Same user, same external_id everywhere</text>
    <rect x="461" y="548" width="358" height="80" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
    <text x="481" y="582" fill="#D9FF4B">Idempotent events</text>
    <text x="481" y="606" fill="#86868B" font-size="12">Safe retries · no duplicate counts</text>
    <rect x="838" y="548" width="358" height="80" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
    <text x="858" y="582" fill="#D9FF4B">Webhook reliability</text>
    <text x="858" y="606" fill="#86868B" font-size="12">Auth, payload contracts, failure handling</text>
  </g>

  <text x="64" y="694" fill="#86868B" font-size="12">Led technical sessions covering the SDK, REST API, and webhook architecture end to end.</text>
</svg>
