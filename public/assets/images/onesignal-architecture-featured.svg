  <rect x="754" y="560" width="462" height="92" fill="#141416" stroke="#F2F1ED" stroke-opacity="0.12"/>
  <text x="774" y="594" fill="#F2F1ED" font-size="16" font-weight="600">SOAP SMS Infrastructure</text>
