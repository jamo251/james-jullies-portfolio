  <line x1="640" y1="508" x2="380" y2="556" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="508" x2="985" y2="556" stroke="#D9FF4B" stroke-opacity="0.5" marker-end="url(#arrow)"/>

